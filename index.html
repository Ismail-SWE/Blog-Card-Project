<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css" />
    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <main class="container">
      <article class="blog__container">

        <div class="blog__img">
          <img src="assets/images/illustration-article.svg" alt="illustration-article"/>
        </div>

        <div class="details__container">
          <span class="blog__category">Learning</span>
          <time class="blog__subtitle" datetime="2023-12-21">Published 21 Dec 2023</time>.

          <h2 class="blog__heading">HTML & CSS foundations</h2>
          <p class="blog__subheading">These languages are the backbone of every website, defining structure, content, and presentation.</p>
        </div>

        <div class="author-profile">
          <img src="assets/images/image-avatar.webp" alt="author-profile">
          <p class="author-name">Greg Hooper</p>
        </div>
        
      </article>
    </main>

    <footer class="attribution">Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. Coded by <a href="#">Ismailov K</a>.
    </footer>
  </body>
</html>
